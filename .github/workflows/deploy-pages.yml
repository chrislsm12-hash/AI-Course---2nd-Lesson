name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare publish directory
        run: |
          mkdir -p publish
          cp index.html publish/
          cp .nojekyll publish/ || touch publish/.nojekyll
          shopt -s nullglob
          for f in *.css *.js; do cp "$f" publish/; done
          for d in css js images assets; do
            if [ -d "$d" ]; then cp -r "$d" publish/; fi
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./publish
